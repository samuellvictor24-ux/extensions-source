name: Build ToonLivre
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build extension
        run: ./gradlew :src:pt:toonlivre:assembleRelease
      - name: Show generated source
        if: always()
        run: |
          find . -iname "*Toonlivre*" -path "*generated*" 2>/dev/null
          find . -iname "*Toonlivre*" -path "*generated*" -exec cat {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: toonlivre-apk
          path: src/pt/toonlivre/build/outputs/apk/**/*.apk
