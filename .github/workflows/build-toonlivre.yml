name: Build ToonLivre
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build extension (clean)
        run: ./gradlew clean :src:pt:toonlivre:assembleRelease --rerun-tasks
      - name: Search for mangalivre leftovers
        if: always()
        run: |
          grep -r "mangalivre" src/pt/toonlivre/build --include="*.xml" -l || echo "no xml matches"
          grep -r "mangalivre" src/pt/toonlivre/build --include="*.kt" -l || echo "no kt matches"
          find src/pt/toonlivre/build -iname "AndroidManifest.xml" -exec echo "--- {} ---" \; -exec cat {} \;
      - uses: actions/upload-artifact@v4
        with:
          name: toonlivre-apk
          path: src/pt/toonlivre/build/outputs/apk/**/*.apk
